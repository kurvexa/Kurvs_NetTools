<!DOCTYPE html>
<html>
<head>
    <title>kurvexa's toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <!-- Library for EXIF reading --> 
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
</head>
<body>

<h1>kurvexa's toolkit</h1>

<!-- WHOIS Lookup -->
<div class="tool">
    <h2>whois lookup</h2>
    <input id="domain" placeholder="example.com">
    <button onclick="whoisLookup()">search</button>
    <button id="toggleRawBtn" onclick="toggleRaw()">show raw data</button>
    <pre id="outputWhois"></pre>
</div>

<!-- IP Lookup -->
<div class="tool">
    <h2>ip lookup</h2>
    <input id="ip" placeholder="8.8.8.8">
    <button onclick="ipLookup()">search</button>
    <pre id="outputIP"></pre>
</div>

<!-- Cipher Detector -->
<div class="tool">
    <h2>cipher detector</h2>
    <textarea id="cipher" placeholder="paste encoded message"></textarea>
    <br><br>
    <button onclick="detectCipher()">detect</button>
    <button onclick="decodeCipher()">decode</button>
    <pre id="outputCipher"></pre>
</div>

<!-- Image Metadata Checker -->
<div class="tool">
    <h2>image metadata checker</h2>
    <input type="file" id="imageInput" onchange="imageMetadata()">
    <pre id="outputImage"></pre>
</div>
<!-- speaker boom boom -->
<div id="speaker-container">
  <img id="speaker-icon" src="IMG_6654.png" alt="speaker" />
  <audio id="speaker-audio" src="lowlife.mp3"></audio>
</div>
<!-- its 5:33 fucking am why the hell am i doing all of this just to play a cover of my favorite somg-->
<script src="script.js"></script>
</body>
</html>
